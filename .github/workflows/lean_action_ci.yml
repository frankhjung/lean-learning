---
name: lean-action-ci

on:
  push:
    branches:
      - "**"
    tags:
      - "*"
  pull_request:
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    if: "!startsWith(github.ref, 'refs/tags/')"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Build, test and lint the project
        id: build-lean
        uses: leanprover/lean-action@v1

      - name: Run executable smoke-tests
        run: |
          lake exe learning
          lake exe learning LEAN

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Re-build the project
        uses: leanprover/lean-action@v1
        with:
          test: false
          lint: false

      - name: Build documentation
        uses: leanprover-community/docgen-action@10db47458f91456d87804787d3dfcd914b9a19e3
        with:
          build-page: false
        continue-on-error: true

