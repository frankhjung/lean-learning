---
name: lean-action-ci

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
      - uses: leanprover/lean-action@v1
      - name: Build and Lint
        run: |
          lake build
          lake lint
      - name: Run main program
        run: lake exe learning HelloWorld
